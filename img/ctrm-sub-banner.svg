<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <!-- CTRM Commodity & Risk Theme Gradient -->
    <linearGradient id="ctrmBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a1e" />
      <stop offset="60%" stop-color="#09142f" />
      <stop offset="100%" stop-color="#140f05" /> <!-- Hint of gold/metallic copper peak -->
    </linearGradient>

    <!-- Metallic/Energy Copper Gold Radial Glow -->
    <radialGradient id="energyGlow" cx="20%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#b45309" stop-opacity="0" />
    </radialGradient>
    <!-- Maritime Blue Glow -->
    <radialGradient id="maritimeGlow" cx="80%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0" />
    </radialGradient>

    <!-- Financial Matrix Patterns -->
    <pattern id="gridSub" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1" />
    </pattern>
    <pattern id="dotSub" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.75" fill="rgba(255, 255, 255, 0.04)" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#ctrmBg)" />
  <rect width="1600" height="600" fill="url(#energyGlow)" />
  <rect width="1600" height="600" fill="url(#maritimeGlow)" />
  <rect width="1600" height="600" fill="url(#gridSub)" />
  <rect width="1600" height="600" fill="url(#dotSub)" />

  <!-- Abstract Bulk Shipping Trade & Port Terminal Schematics -->
  <g opacity="0.2" stroke="#475569" stroke-width="1" fill="none">
    <!-- Port Berth Contours / Bulk Cargo Carrier Outline -->
    <path d="M 50,450 L 250,450 L 300,420 L 700,420 L 730,450 L 950,450" />
    <!-- Gantry Cranes Structure lines -->
    <path d="M 350,420 L 350,300 M 350,320 L 450,320 M 420,320 L 350,380" stroke="#f59e0b" stroke-width="1.5" />
    <path d="M 500,420 L 500,280 M 500,300 L 620,300 M 580,300 L 500,360" stroke="#f59e0b" stroke-width="1.5" />
  </g>

  <!-- Commodity Freight Routes (Cross-continental curves) -->
  <g opacity="0.35" stroke="#3b82f6" stroke-width="0.8" fill="none">
    <path d="M 100,500 C 300,320 600,520 850,280 S 1300,100 1500,200" stroke-dasharray="4,4" />
    <path d="M 200,420 C 500,180 800,420 1100,240 S 1400,220 1550,150" />
    
    <!-- Location Ticks -->
    <circle cx="850" cy="280" r="5" fill="#f59e0b" />
    <circle cx="1100" cy="240" r="4" fill="#14b8a6" />
    <circle cx="1300" cy="150" r="3" fill="#3b82f6" />
  </g>

  <!-- Quantitative VaR Monte Carlo Simulated Distribution -->
  <g transform="translate(1050, 100)" opacity="0.25">
    <!-- Curve of Normal Distribution & VaR breakdown -->
    <path d="M 10,350 Q 150,350 200,200 T 250,50 T 300,350 T 450,350" fill="none" stroke="#fff" stroke-width="2" />
    <!-- Shaded Left-tail Risk Area (Critical VaR region) -->
    <path d="M 10,350 Q 150,350 200,200 L 200,350 Z" fill="#ef4444" opacity="0.3" />
    <line x1="200" y1="120" x2="200" y2="355" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3" />
    <text x="210" y="140" fill="#ef4444" font-family="monospace" font-size="11" font-weight="bold">99% VaR LIMIT</text>
  </g>

  <!-- HUD Telemetry Information Layer -->
  <g fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">
    <text x="50" y="50">CTRM CORE RESEARCH CHANNEL // SPOT PORTFOLIO</text>
    <text x="50" y="70">MARKET DATA INDEX: BRENT_LCO / LME_COPPER / CBOT_WHEAT</text>
    
    <!-- Code Blocks (representing physical physical storage pricing loops) -->
    <text x="50" y="110">def compute_var(exposure, vol, confidence=0.99):</text>
    <text x="70" y="130">return exposure * vol * stats.norm.ppf(confidence)</text>

    <!-- Right HUD values -->
    <text x="1350" y="50">VOLATILITY_LAG: DLY_20D</text>
    <text x="1350" y="70">BASIS_SPREAD: STABLE</text>
    <text x="1350" y="90">EXPOSURE_VAR: COMPUTED</text>
  </g>

  <!-- Overlay aesthetic line -->
  <line x1="0" y1="580" x2="1600" y2="580" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
</svg>
