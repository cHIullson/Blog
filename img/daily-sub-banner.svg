<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="100%" height="100%">
  <!-- Definitions -->
  <defs>
    <!-- Warm amber-indigo twilight background -->
    <linearGradient id="dailyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060814" />
      <stop offset="50%" stop-color="#111025" />
      <stop offset="100%" stop-color="#241307" /> <!-- Amber sunset horizon -->
    </linearGradient>

    <!-- Warm Golden Cognitive Radiance -->
    <radialGradient id="thoughtGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#92400e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#92400e" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cosmosGlow" cx="85%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#d97706" stop-opacity="0" />
    </radialGradient>

    <!-- Golden Ratio & Thought Spirals Patterns -->
    <pattern id="phiGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="40" fill="none" stroke="rgba(217, 119, 6, 0.015)" stroke-width="0.75" />
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(217, 119, 6, 0.01)" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="600" fill="url(#dailyBg)" />
  <rect width="1600" height="600" fill="url(#thoughtGlow)" />
  <rect width="1600" height="600" fill="url(#cosmosGlow)" />
  <rect width="1600" height="600" fill="url(#phiGrid)" />

  <!-- 1. Abstract Golden Ratio Spiral representation (Fibonacci / Cognitive Growth) -->
  <g transform="translate(680, 50)" opacity="0.28" stroke="#d97706" fill="none" stroke-width="1.2">
    <!-- Golden spiral points mapping -->
    <path d="M 120,180 A 10,10 0 0,1 120,170 A 20,20 0 0,1 140,170 A 30,30 0 0,1 140,200 A 50,50 0 0,1 90,200 A 80,80 0 0,1 90,120 A 130,130 0 0,1 220,120 A 210,210 0 0,1 220,330 A 340,340 0 0,1 -120,330" />
    
    <!-- Fine alignment lines intersecting coordinates -->
    <line x1="120" y1="0" x2="120" y2="500" stroke="rgba(217, 119, 6, 0.15)" stroke-width="0.5" stroke-dasharray="2,5" />
    <line x1="-200" y1="200" x2="500" y2="200" stroke="rgba(217, 119, 6, 0.15)" stroke-width="0.5" stroke-dasharray="2,5" />
  </g>

  <!-- 2. Philosophical Constellations & Concentric Orbits (Thought Spheres) -->
  <g opacity="0.3" stroke="#f59e0b" fill="none" stroke-width="0.8">
    <!-- Spherical cognitive pathways -->
    <circle cx="280" cy="300" r="160" />
    <circle cx="280" cy="300" r="110" stroke-dasharray="4,4" />
    <circle cx="280" cy="300" r="60" />

    <!-- Connected Knowledge Points -->
    <g fill="#d97706" stroke="none">
      <circle cx="280" cy="140" r="4.5" />
      <circle cx="170" cy="300" r="3.5" />
      <circle cx="390" cy="300" r="5" />
      <circle cx="330" cy="410" r="3" />
    </g>
    
    <!-- Link Lines linking outward -->
    <line x1="280" y1="140" x2="390" y2="300" />
    <line x1="170" y1="300" x2="330" y2="410" />
    
    <text x="180" y="160" fill="#f59e0b" font-family="sans-serif" font-size="10" stroke="none" opacity="0.7">PERCEPTION // 认知</text>
    <text x="320" y="435" fill="#f59e0b" font-family="sans-serif" font-size="10" stroke="none" opacity="0.7">境界 // INTELLECT</text>
  </g>

  <!-- 3. Abstract Bookstack Lines or Organic Flow Curves -->
  <g opacity="0.2" fill="none" stroke="#b45309" stroke-width="1">
    <!-- Stack of classic thought structures -->
    <path d="M 1200,450 L 1450,450 L 1450,480 L 1200,480 Z" />
    <path d="M 1210,410 L 1435,410 L 1435,450 L 1210,450 Z" />
    <path d="M 1240,375 L 1410,375 L 1410,410 L 1240,410 Z" />
    <!-- Tilted book -->
    <path d="M 1275,340 L 1385,300 L 1415,330 L 1305,370 Z" />
  </g>

  <!-- 4. Text and Monospace Literature Quotes Overlay -->
  <g fill="rgba(245,158,11,0.5)" font-family="monospace" font-size="10" opacity="0.8">
    <text x="50" y="50">HUMANITY THOUGHTS CHANNEL // COGNITIVE LABS</text>
    <text x="50" y="70">THEMES: PHILOSOPHY OF MIND / KNOWLEDGE BOUNDARIES / GEER LIFE</text>
    
    <!-- Standard text snippet representing philosophical depth -->
    <text x="1180" y="50" text-anchor="end">"做学问的八个境界："</text>
    <text x="1180" y="70" text-anchor="end">1. 形成主见 - 2. 发现缺漏 - 3. 融会贯通</text>
  </g>

  <!-- Ground Line -->
  <line x1="0" y1="580" x2="1600" y2="580" stroke="rgba(217, 119, 6, 0.1)" stroke-width="2" />
</svg>
