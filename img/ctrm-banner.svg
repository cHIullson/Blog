<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <!-- Definitions for gradients, filters, patterns -->
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c1e" />
      <stop offset="50%" stop-color="#0a142c" />
      <stop offset="100%" stop-color="#030611" />
    </linearGradient>
    
    <!-- Glowing Orbs (matching CTRM Deep Blue, Tech Green, and Daily Golden Amber) -->
    <radialGradient id="tealGlow" cx="15%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="indigoGlow" cx="80%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="75%" r="35%">
      <stop offset="0%" stop-color="#b45309" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#b45309" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Patterns -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1" />
    </pattern>
    <pattern id="dotGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(255, 255, 255, 0.05)" />
    </pattern>
  </defs>

  <!-- 1. Background Fill -->
  <rect width="1600" height="900" fill="url(#bgGrad)" />

  <!-- 2. Glowing Ambient Lights -->
  <rect width="1600" height="900" fill="url(#tealGlow)" />
  <rect width="1600" height="900" fill="url(#indigoGlow)" />
  <rect width="1600" height="900" fill="url(#goldGlow)" />

  <!-- 3. Tech Grids -->
  <rect width="1600" height="900" fill="url(#grid)" />
  
  <!-- Perspective line overlay for depth -->
  <g opacity="0.35">
    <!-- Perspective horizontal lines -->
    <line x1="0" y1="450" x2="1600" y2="450" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />
    <line x1="0" y1="550" x2="1600" y2="580" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    <line x1="0" y1="680" x2="1600" y2="730" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  </g>

  <!-- 4. Global Commodity Trade Routes / Constellation Web -->
  <g opacity="0.3" stroke="#3b82f6" stroke-width="0.75" fill="none">
    <!-- Anchor connection lines mimicking shipping routes / price correlation networks -->
    <path d="M 200,250 C 400,200 600,450 800,400 S 1200,150 1400,300" stroke-dasharray="5,5" />
    <path d="M 300,550 C 500,400 800,600 1000,350 S 1300,500 1500,450" stroke-dasharray="8,4" />
    <path d="M 100,600 C 400,700 700,500 900,650 S 1200,750 1450,550" stroke-dasharray="3,6" />
    
    <!-- Pulse spots -->
    <circle cx="200" cy="250" r="4.5" fill="#3b82f6" opacity="0.8" />
    <circle cx="800" cy="400" r="5.5" fill="#14b8a6" opacity="0.8" />
    <circle cx="1400" cy="300" r="5" fill="#f59e0b" opacity="0.8" />
    <circle cx="1000" cy="350" r="6.5" fill="#6366f1" opacity="0.9" />
    <circle cx="500" cy="400" r="4" fill="#3b82f6" opacity="0.7" />
  </g>

  <!-- 5. Interactive Trading Charts & Volatility Curves (Risk Indices) -->
  <g transform="translate(100, 100)">
    <!-- Main Volatility / Commodity Index Spline -->
    <!-- Beautiful gradient line -->
    <linearGradient id="chartLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="40%" stop-color="#3b82f6" />
      <stop offset="80%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <!-- VaR Level upper band -->
    <path d="M 50,450 Q 250,300 450,400 T 850,220 T 1250,350 L 1400,280" fill="none" stroke="rgba(239, 68, 68, 0.45)" stroke-width="1.5" stroke-dasharray="4,4" />
    
    <!-- Trading Price Curve filled area with opacity -->
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
    <path d="M 50,550 Q 250,380 450,500 T 850,310 T 1250,420 L 1400,380 L 1400,750 L 50,750 Z" fill="url(#areaGrad)" />
    
    <!-- Actual Commodity Price Curve stroke -->
    <path d="M 50,550 Q 250,380 450,500 T 850,310 T 1250,420 L 1400,380" fill="none" stroke="url(#chartLineGrad)" stroke-width="3" />

    <!-- Interactive Data Ticks on chart -->
    <g fill="rgba(255,255,255,0.7)" font-family="monospace" font-size="10">
      <circle cx="450" cy="500" r="5" fill="#3b82f6" stroke="#fff" stroke-width="1" />
      <text x="465" y="495" fill="#3b82f6" font-weight="bold">RISK POS: +42.1%</text>
      <line x1="450" y1="500" x2="450" y2="750" stroke="rgba(59,130,246,0.25)" stroke-width="1" stroke-dasharray="3,3" />

      <circle cx="850" cy="310" r="5" fill="#14b8a6" stroke="#fff" stroke-width="1" />
      <text x="865" y="305" fill="#14b8a6" font-weight="bold">VaR THRESHOLOGY [99%]</text>
      <line x1="850" y1="310" x2="850" y2="750" stroke="rgba(20,184,166,0.25)" stroke-width="1" stroke-dasharray="3,3" />
      
      <circle cx="1250" cy="420" r="5" fill="#f59e0b" stroke="#fff" stroke-width="1" />
      <text x="1265" y="415" fill="#f59e0b" font-weight="bold">BASIS GAP: 0.12</text>
    </g>

    <!-- Candlestick chart simulation snippets on back grid -->
    <g opacity="0.45">
      <!-- Bullish green candles -->
      <g fill="#10b981" stroke="#10b981" stroke-width="1.5">
        <line x1="150" y1="580" x2="150" y2="520" />
        <rect x="145" y="540" width="10" height="30" />

        <line x1="170" y1="530" x2="170" y2="470" />
        <rect x="165" y="490" width="10" height="30" />

        <line x1="300" y1="440" x2="300" y2="390" />
        <rect x="295" y="405" width="10" height="25" />
      </g>
      <!-- Bearish red candles -->
      <g fill="#ef4444" stroke="#ef4444" stroke-width="1.5">
        <line x1="190" y1="510" x2="190" y2="440" />
        <rect x="185" y="455" width="10" height="35" />

        <line x1="210" y1="480" x2="210" y2="410" />
        <rect x="205" y="425" width="10" height="35" />
        
        <line x1="320" y1="430" x2="320" y2="495" />
        <rect x="315" y="440" width="10" height="40" />
      </g>
    </g>

    <!-- X, Y Chart Axis and Hud Markings -->
    <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
      <line x1="0" y1="750" x2="1450" y2="750" />
      <line x1="0" y1="200" x2="0" y2="750" />
      
      <!-- Axis Tick Labels -->
      <g fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="10" stroke="none">
        <text x="-40" y="205">$ 120 /bbl</text>
        <text x="-35" y="340">$ 100</text>
        <text x="-30" y="480">$ 80</text>
        <text x="-30" y="620">$ 60</text>
        <text x="-30" y="755">$ 40</text>

        <text x="50" y="775">JAN 25</text>
        <text x="250" y="775">MAR 25</text>
        <text x="450" y="775">MAY 25</text>
        <text x="650" y="775">JUL 25</text>
        <text x="850" y="775">SEP 25</text>
        <text x="1050" y="775">NOV 25</text>
        <text x="1250" y="775">JAN 26</text>
      </g>
    </g>
  </g>

  <!-- 6. HUD UI / Systems Telemetry Borders Overlay (Top and Corners) -->
  <g stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" fill="none">
    <!-- Top HUD horizontal bar -->
    <line x1="30" y1="30" x2="1570" y2="30" />
    <path d="M 40,30 L 50,45 L 200,45 L 210,30" />
    <path d="M 1560,30 L 1550,45 L 1400,45 L 1390,30" />

    <!-- Aesthetic HUD Corners -->
    <!-- Top Left -->
    <path d="M 30,80 L 30,30 L 80,30" stroke-width="2.5" stroke="#1e3a8a" />
    <!-- Top Right -->
    <path d="M 1570,80 L 1570,30 L 1520,30" stroke-width="2.5" stroke="#1e3a8a" />
    <!-- Bottom Left -->
    <path d="M 30,820 L 30,870 L 80,870" stroke-width="2.5" stroke="#1e3a8a" />
    <!-- Bottom Right -->
    <path d="M 1570,820 L 1570,870 L 1520,870" stroke-width="2.5" stroke="#1e3a8a" />
  </g>

  <!-- 7. Abstract HUD Tech Data Reads (Sleek layout, monospace code fragments) -->
  <g fill="rgba(255,255,255,0.4)" font-family="monospace" font-size="10">
    <text x="65" y="42">SYS_STATUS: ACTIVE [OK]</text>
    <text x="250" y="42">PROD_MODEL: ISOLATION_FOREST_V2.1</text>
    <text x="1390" y="42">P&amp;L RISK SCENARIOS: 65,536</text>
    
    <!-- Tiny coordinates -->
    <text x="40" y="855">LAT: 39.9042° N</text>
    <text x="180" y="855">LON: 116.4074° E</text>
    <text x="1450" y="855">UTC: 2026-06-16 11:24:59</text>
  </g>
</svg>
